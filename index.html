<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HYDRA CLIENT</title>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <link rel="stylesheet" href="style.css?v=4" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="particles-js"></div>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div id="authScreen" class="screen active">
    <div class="auth-wrapper">
      <div class="auth-left">
        <div class="logo-area">
          <div class="logo-glow"></div>
          <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">HYDRA</span>
            <span class="logo-sub">CLIENT</span>
          </div>
          <div class="logo-tagline">AOB TO C++ CONVERTER</div>
        </div>
        <div class="features">
          <div class="feature">
            <span class="feature-icon">⚡</span>
            <span>Fast Conversion</span>
          </div>
          <div class="feature">
            <span class="feature-icon">🔒</span>
            <span>Secure Auth</span>
          </div>
          <div class="feature">
            <span class="feature-icon">☁️</span>
            <span>Cloud Sync</span>
          </div>
        </div>
      </div>
      <div class="auth-right">
        <div class="auth-card">
          <div class="card-header">
            <h1>Welcome Back</h1>
            <p>Sign in to access your converter</p>
          </div>
          <div class="tabs" role="tablist">
            <button id="tabLogin" class="tab active" role="tab" aria-selected="true">Sign In</button>
            <button id="tabRegister" class="tab" role="tab" aria-selected="false">Register</button>
          </div>
          <div id="msg" class="msg"></div>
          
          <form id="formLogin" class="form active" role="tabpanel">
            <div class="input-group">
              <label for="loginUser">Username</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username" required />
              </div>
            </div>
            <div class="input-group">
              <label for="loginPassword">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required />
                <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')" aria-label="Toggle password">👁</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" onclick="event.preventDefault(); login()">
              <span class="btn-text">Sign In</span>
              <span class="btn-loader"></span>
            </button>
            <p class="switch-tab">Don't have an account? <a href="#" id="goRegister">Create one</a></p>
          </form>
          <div class="auth-footer">
            <p>© 2026 HYDRA CLIENT</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="converterScreen" class="screen">
    <div class="content-area">
      <div id="sectionConverter" class="section-content active">
        <div class="card converter-card" id="hover-card">
          <div class="converter-header">
            <h1>Hydra Client</h1>
            <div id="userDisplay2"></div>
          </div>
            <div class="converter-body">
              <div class="input-group">
                <label for="aobInput">AOB Pattern</label>
                <input id="aobInput" type="text" placeholder="Paste AOB: A1 B2 00 4F ?? 1C ..." />
              </div>
              <div class="byte-count" id="byteCount">BYTE COUNT: 0</div>
              <div class="output-group">
                <label>C++ Array Output</label>
                <pre id="cppOutput">unsigned char aob[] = { };</pre>
              </div>
              <button id="copyBtn" class="btn btn-primary" onclick="copyCode()">
                <span class="btn-text">📋 Copy Code</span>
                <span class="btn-loader"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBxoISU9c0FgaMZYlLCAyczkFMoYly8ucs",
      authDomain: "hydra-client-code.firebaseapp.com",
      projectId: "hydra-client-code",
      storageBucket: "hydra-client-code.firebasestorage.app",
      messagingSenderId: "596490077600",
      appId: "1:596490077600:web:49a53a62c233f2bdb210c5",
      measurementId: "G-SGMZTZWTL5"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
