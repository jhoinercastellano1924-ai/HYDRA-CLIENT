<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HYDRA CLIENT</title>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <link rel="stylesheet" href="style.css?v=4" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="particles-js"></div>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div id="authScreen" class="screen active">
    <div class="auth-wrapper">
      <div class="auth-left">
        <div class="logo-area">
          <div class="logo-glow"></div>
          <div class="logo">
            <span class="logo-icon">⚡</span>
            <span class="logo-text">HYDRA</span>
            <span class="logo-sub">CLIENT</span>
          </div>
          <div class="logo-tagline">AOB TO C++ CONVERTER</div>
        </div>
        <div class="features">
          <div class="feature">
            <span class="feature-icon">⚡</span>
            <span>Fast Conversion</span>
          </div>
          <div class="feature">
            <span class="feature-icon">🔒</span>
            <span>Secure Auth</span>
          </div>
          <div class="feature">
            <span class="feature-icon">☁️</span>
            <span>Cloud Sync</span>
          </div>
        </div>
      </div>
      <div class="auth-right">
        <div class="auth-card">
          <div class="card-header">
            <h1>Welcome Back</h1>
            <p>Sign in to access your converter</p>
          </div>
          <div class="tabs" role="tablist">
            <button id="tabLogin" class="tab active" role="tab" aria-selected="true">Sign In</button>
            <button id="tabRegister" class="tab" role="tab" aria-selected="false">Register</button>
          </div>
          <div id="msg" class="msg"></div>
          
          <form id="formLogin" class="form active" role="tabpanel">
            <div class="input-group">
              <label for="loginUser">Username</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="loginUser" placeholder="Enter username" autocomplete="username" required />
              </div>
            </div>
            <div class="input-group">
              <label for="loginPassword">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="loginPassword" placeholder="Enter password" autocomplete="current-password" required />
                <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')" aria-label="Toggle password">👁</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" onclick="event.preventDefault(); login()">
              <span class="btn-text">Sign In</span>
              <span class="btn-loader"></span>
            </button>
            <p class="switch-tab">Don't have an account? <a href="#" id="goRegister">Create one</a></p>
          </form>

          <form id="formRegister" class="form" role="tabpanel" hidden>
            <div class="input-group">
              <label for="regUsername">Username</label>
              <div class="input-wrapper">
                <span class="input-icon">👤</span>
                <input type="text" id="regUsername" placeholder="Choose username" autocomplete="username" required />
              </div>
            </div>
            <div class="input-group">
              <label for="regPassword">Password</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="regPassword" placeholder="Create password" autocomplete="new-password" required />
                <button type="button" class="toggle-password" onclick="togglePassword('regPassword')" aria-label="Toggle password">👁</button>
              </div>
            </div>
            <div class="input-group">
              <label for="regConfirm">Confirm Password</label>
              <div class="input-wrapper">
                <span class="input-icon">🔒</span>
                <input type="password" id="regConfirm" placeholder="Confirm password" autocomplete="new-password" required />
                <button type="button" class="toggle-password" onclick="togglePassword('regConfirm')" aria-label="Toggle password">👁</button>
              </div>
            </div>
            <button type="submit" class="btn btn-primary" onclick="event.preventDefault(); register()">
              <span class="btn-text">Create Account</span>
              <span class="btn-loader"></span>
            </button>
            <p class="switch-tab">Already have an account? <a href="#" id="goLogin">Sign In</a></p>
          </form>

          <div class="divider"><span>or continue with</span></div>
          <div class="social-buttons">
            <button type="button" class="btn-social" onclick="alert('Firebase Google Auth not configured')">
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/></svg>
              <span>Google</span>
            </button>
            <button type="button" class="btn-social" onclick="alert('Firebase GitHub Auth not configured')">
              <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.75-.015-.765.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.28-1.56 3.285-1.23 3.285-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0024 12c0-6.63-5.37-12-12-12z"/></svg>
              <span>GitHub</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="converterScreen" class="screen">
    <div class="content-area">
      <div id="sectionConverter" class="section-content active">
        <div class="card converter-card" id="hover-card">
          <div class="converter-header">
            <h1>Hydra Client</h1>
            <div id="userDisplay2"></div>
          </div>
            <div class="converter-body">
              <div class="input-group">
                <label for="aobInput">AOB Pattern</label>
                <input id="aobInput" type="text" placeholder="Paste AOB: A1 B2 00 4F ?? 1C ..." />
              </div>
              <div class="byte-count" id="byteCount">BYTE COUNT: 0</div>
              <div class="output-group">
                <label>C++ Array Output</label>
                <pre id="cppOutput">unsigned char aob[] = { };</pre>
              </div>
              <button id="copyBtn" class="btn btn-primary" onclick="copyCode()">
                <span class="btn-text">📋 Copy Code</span>
                <span class="btn-loader"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBxoISU9c0FgaMZYlLCAyczkFMoYly8ucs",
      authDomain: "hydra-client-code.firebaseapp.com",
      projectId: "hydra-client-code",
      storageBucket: "hydra-client-code.firebasestorage.app",
      messagingSenderId: "596490077600",
      appId: "1:596490077600:web:49a53a62c233f2bdb210c5",
      measurementId: "G-SGMZTZWTL5"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script src="script.js?v=4"></script>
</body>
</html>
